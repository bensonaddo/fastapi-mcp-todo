<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header__brand">
        <div class="header__logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <div>
          <h1 class="header__title">Todo Manager</h1>
          <p class="header__subtitle">Organize tasks with clarity and control</p>
        </div>
      </div>
      <div class="stats" id="stats">
        <div class="stat">
          <span class="stat__value" id="stat-total">0</span>
          <span class="stat__label">Total</span>
        </div>
        <div class="stat">
          <span class="stat__value stat__value--active" id="stat-active">0</span>
          <span class="stat__label">Active</span>
        </div>
        <div class="stat">
          <span class="stat__value stat__value--done" id="stat-done">0</span>
          <span class="stat__label">Completed</span>
        </div>
      </div>
    </header>

    <section class="panel">
      <form class="add-form" id="add-form" autocomplete="off">
        <label class="sr-only" for="todo-input">New todo</label>
        <input
          type="text"
          id="todo-input"
          class="add-form__input"
          placeholder="What needs to be done?"
          maxlength="200"
          required
        >
        <button type="submit" class="btn btn--primary" id="add-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add Todo
        </button>
      </form>

      <div class="toolbar">
        <div class="filter-group" role="group" aria-label="Filter todos">
          <button type="button" class="filter-btn filter-btn--active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="active">Active</button>
          <button type="button" class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <button type="button" class="btn btn--ghost" id="refresh-btn" aria-label="Refresh todos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
          </svg>
          Refresh
        </button>
      </div>
    </section>

    <main>
      <div class="grid" id="todo-grid" aria-live="polite"></div>
      <div class="empty-state" id="empty-state" hidden>
        <div class="empty-state__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M8 12h8M8 8h5M8 16h3"/>
          </svg>
        </div>
        <h2>No todos yet</h2>
        <p>Add your first task above to get started.</p>
      </div>
    </main>
  </div>

  <!-- Edit modal -->
  <dialog class="modal" id="edit-modal" aria-labelledby="edit-modal-title">
    <form method="dialog" class="modal__content" id="edit-form">
      <h2 class="modal__title" id="edit-modal-title">Edit Todo</h2>
      <label class="field-label" for="edit-input">Task description</label>
      <input type="text" id="edit-input" class="field-input" maxlength="200" required>
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" id="edit-cancel">Cancel</button>
        <button type="submit" class="btn btn--primary" id="edit-save">Save Changes</button>
      </div>
    </form>
  </dialog>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="assertive"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
