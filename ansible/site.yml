# Deploy the dockerized Todo API to plain VMs (the non-Kubernetes path).
# Usage:
#   ansible-playbook -i inventory.ini site.yml \
#     -e app_image=ghcr.io/OWNER/fastapi-mcp-todo:v1.0.0 \
#     -e database_url='postgresql://todo:***@db-host:5432/todos'
---
- name: Deploy fastapi-mcp-todo
  hosts: todo_servers
  become: true

  vars:
    app_name: fastapi-mcp-todo
    app_image: ghcr.io/OWNER/fastapi-mcp-todo:latest
    app_port: 8000
    app_dir: /opt/{{ app_name }}
    web_concurrency: 2
    # Override via -e or vault; empty string keeps the container's SQLite default
    database_url: ""

  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Add Docker apt key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Ensure Docker is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0750"

    - name: Render docker-compose file
      ansible.builtin.template:
        src: templates/docker-compose.prod.yml.j2
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: "0640"
      notify: Restart app

    - name: Pull latest image
      community.docker.docker_image:
        name: "{{ app_image }}"
        source: pull
      notify: Restart app

    - name: Start the stack
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present

    - name: Wait for health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/health"
        status_code: 200
      register: health
      retries: 12
      delay: 5
      until: health.status == 200

  handlers:
    - name: Restart app
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present
        recreate: always
