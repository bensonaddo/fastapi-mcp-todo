apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - hpa.yaml
  - pdb.yaml

namespace: todo-prod

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: todo-api

images:
  - name: ghcr.io/OWNER/fastapi-mcp-todo
    newTag: latest # CI overrides with the release tag
