apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: todo-staging

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: todo-api
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: todo-staging.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: todo-staging.example.com
    target:
      kind: Ingress
      name: todo-api

images:
  - name: ghcr.io/OWNER/fastapi-mcp-todo
    newTag: latest # CI overrides with the immutable commit-SHA tag
