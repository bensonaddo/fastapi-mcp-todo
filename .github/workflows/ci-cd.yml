name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.12.3
      - run: ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v --tb=short

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR # needed if the package is ever made private
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan pushed image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  check-deploy-secrets:
    name: Check deploy credentials
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    outputs:
      has-staging: ${{ steps.check.outputs.has-staging }}
      has-prod: ${{ steps.check.outputs.has-prod }}
    steps:
      - id: check
        run: |
          echo "has-staging=${{ secrets.STAGING_KUBECONFIG != '' }}" >> "$GITHUB_OUTPUT"
          echo "has-prod=${{ secrets.PROD_KUBECONFIG != '' }}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build, scan, check-deploy-secrets]
    # Skips cleanly (not red) until STAGING_KUBECONFIG is configured
    if: github.ref == 'refs/heads/main' && needs.check-deploy-secrets.outputs.has-staging == 'true'
    environment:
      name: staging
      url: https://todo-staging.example.com
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Deploy with kustomize
        run: |
          cd k8s/overlays/staging
          kustomize edit set image ghcr.io/OWNER/fastapi-mcp-todo=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}
          kubectl apply -k .
          kubectl -n todo-staging rollout status deployment/todo-api --timeout=180s
      - name: Smoke test
        run: |
          kubectl -n todo-staging run smoke --rm -i --restart=Never \
            --image=curlimages/curl:8.8.0 -- \
            curl -fsS http://todo-api.todo-staging.svc/health

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build, scan, check-deploy-secrets]
    # Skips cleanly (not red) until PROD_KUBECONFIG is configured
    if: startsWith(github.ref, 'refs/tags/v') && needs.check-deploy-secrets.outputs.has-prod == 'true'
    environment:
      name: production # protected: requires manual approval in repo settings
      url: https://todo.example.com
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Deploy with kustomize
        run: |
          cd k8s/overlays/production
          kustomize edit set image ghcr.io/OWNER/fastapi-mcp-todo=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}
          kubectl apply -k .
          kubectl -n todo-prod rollout status deployment/todo-api --timeout=300s
      - name: Smoke test
        run: |
          kubectl -n todo-prod run smoke --rm -i --restart=Never \
            --image=curlimages/curl:8.8.0 -- \
            curl -fsS http://todo-api.todo-prod.svc/health
      - name: Rollback on failure
        if: failure()
        run: kubectl -n todo-prod rollout undo deployment/todo-api
